<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150">
  <defs>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="520" height="150" rx="16" fill="#0c0c0e"/>

  <!-- Subtle inner glow border -->
  <rect x="1" y="1" width="518" height="148" rx="15" fill="none" stroke="#1e1b4b" stroke-width="1.5"/>

  <!-- Scientific notation display -->
  <text
    x="260" y="72"
    text-anchor="middle"
    font-family="'Courier New', 'Cascadia Code', monospace"
    font-size="42"
    font-weight="700"
    fill="url(#numGrad)"
    letter-spacing="-1"
  >1.500e+∞</text>

  <!-- Library name -->
  <text
    x="260" y="112"
    text-anchor="middle"
    font-family="'Courier New', 'Cascadia Code', monospace"
    font-size="17"
    fill="url(#labelGrad)"
    letter-spacing="3"
  >arbitrary-numbers</text>

  <!-- Tagline -->
  <text
    x="260" y="135"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="11"
    fill="#52525b"
    letter-spacing="0.5"
  >numbers beyond Number.MAX_SAFE_INTEGER</text>
</svg>
